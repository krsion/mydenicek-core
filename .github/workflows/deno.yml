# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow installs Deno and validates the monorepo packages.
# For more information see: https://github.com/denoland/setup-deno

name: Deno CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Uncomment this step to verify the use of 'deno fmt' on each commit.
      # - name: Verify formatting
      #   run: deno fmt --check

      - name: Run linter
        run: deno lint packages/core packages/formative packages/sync-server apps/sync-server apps/playground apps/mywebnicek

      - name: Type-check packages and apps
        run: |
          deno check packages/core/mod.ts
          deno check packages/sync-server/mod.ts
          deno check apps/sync-server/main.ts

      - name: Run package tests
        run: |
          deno test --allow-all --no-check packages/core/tests
          deno test --allow-all --no-check packages/formative/tests
          deno test --allow-read --allow-write packages/sync-server/tests

      - name: Install playground dependencies
        working-directory: apps/playground
        run: deno install

      - name: Build and test playground
        working-directory: apps/playground
        run: |
          deno task build
          deno task test

      - name: Install mywebnicek dependencies
        working-directory: apps/mywebnicek
        run: deno install

      - name: Build and test mywebnicek
        working-directory: apps/mywebnicek
        run: |
          deno task build
          deno task test

      - name: Lint package docs
        working-directory: packages/core
        run: deno doc --lint mod.ts
